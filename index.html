<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recharge PIN Gen</title>
    <style>
      td,
      th,
      thead,
      tbody,
      tr {
        border-collapse: collapse;
        border: 1px solid black;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <select name="" id="provider">
      <option value="">Select a Network Provider</option>
      <option value="MTN">MTN</option>
      <option value="Glo">Glo</option>
      <option value="Airtel">Airtel</option>
      <option value="9Mobile">9 Mobile</option>
    </select>
    <select name="" id="amount">
      <option value="">Select an Amount</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="500">500</option>
      <option value="1000">1000</option>
    </select>
    <button onclick="genPin()">Get Recharge PIN</button>
    <p id="output"></p>
    <input
      type="text"
      name=""
      id="load"
      value="*311*#"
      placeholder="Enter *311*PIN#"
    />
    <button onclick="loadPin()">Load</button>
    <p id="message"></p>
    <p id="balance">Balance: #0</p>

    <h3>BalanceProvider</h3>
    <table>
      <thead>
        <tr>
          <th>Provider</th>
          <th>Balance</th>
        </tr>
      </thead>
      <tbody id="providerTbody"></tbody>
    </table>

    <h3>Cards</h3>
    <table>
      <thead>
        <tr>
          <th>S/N</th>
          <th>PIN</th>
          <th>Amount</th>
          <th>Provider</th>
          <th>Used</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </body>
</html>
<script>
  let cards = JSON.parse(localStorage.getItem("cardDatabase")) || [];
  let currentPin = "";
  let balance = +localStorage.getItem("mybalance") || 0;
  let providerBalances = JSON.parse(
    localStorage.getItem("providerBalances"),
  ) || { MTN: 0, Glo: 0, Airtel: 0, "9Mobile": 0 };
  let provider = document.getElementById("provider");
  let amount = document.getElementById("amount");

  function displayBal() {
    document.getElementById("balance").innerHTML = `Balance: #${balance}`;
  }
  displayBal();

  function displayProviderBalances() {
    providerTbody.innerHTML = "";
    Object.keys(providerBalances).forEach((provider) => {
      providerTbody.innerHTML += `<tr>
        <td>${provider}</td>
        <td>#${providerBalances[provider]}</td>
      </tr>`;
    });
  }
  displayProviderBalances();

  function genPin() {
    let res = document.getElementById("output");

    if (!provider.value || !amount.value) {
      alert("Please select both a provider and an amount.");
      return;
    }

    let pin = "";
    for (let i = 0; i < 12; i++) {
      pin += Math.floor(Math.random() * 10);
    }
    currentPin = pin;

    res.innerHTML = `
    The ${provider.value} #${amount.value} PIN is: <br>
    <span style="font-size: 1.2em; color: #007bff;">${pin}</span>
  `;
    let cardObj = {
      provider: provider.value,
      amount: amount.value,
      pin: currentPin,
      isUsed: false,
    };
    cards.push(cardObj);
    localStorage.setItem("cardDatabase", JSON.stringify(cards));
    console.log(cards);
    displayCards();
  }

  function loadPin() {
    let loader = document.getElementById("load");
    let loaderVal = loader.value.trim();
    let verifyPin = loaderVal.slice(5, 17);

    if (loaderVal === "*311*#" || verifyPin === "") {
      alert("Please input a PIN to recharge.");
      return;
    }

    if (
      !loaderVal.startsWith("*311*") ||
      !loaderVal.endsWith("#") ||
      loaderVal.length !== 18 ||
      isNaN(verifyPin)
    ) {
      alert("Invalid Format");
    } else {
      let matchedCard = cards.find((card) => card.pin === verifyPin);
      if (!matchedCard) {
        alert("Invalid Card");
        return;
      }
      if (matchedCard.isUsed === true) {
        alert("This card has already been used.");
        return;
      }

      balance += +matchedCard.amount;
      localStorage.setItem("mybalance", balance);

      providerBalances[matchedCard.provider] += +matchedCard.amount;
      localStorage.setItem(
        "providerBalances",
        JSON.stringify(providerBalances),
      );

      displayBal();
      displayProviderBalances();
      alert(
        `You've successfully loaded your ${matchedCard.provider} #${matchedCard.amount} recharge card. Kindly check your balance.`,
      );

      matchedCard.isUsed = true;
      localStorage.setItem("cardDatabase", JSON.stringify(cards));

      loader.value = "*311*#";
      provider.value = "";
      amount.value = "";
      currentPin = "";
      displayCards();
    }
  }

  function displayCards() {
    tbody.innerHTML = "";
    cards
      .slice()
      .reverse()
      .forEach((card, index) => {
        tbody.innerHTML += `<tr>
        <td>${index + 1}</td>
        <td>${card.pin}</td>
        <td>${card.amount}</td>
        <td>${card.provider}</td>
        <td>${card.isUsed ? "Yes" : "No"}</td>
      </tr>`;
      });
  }
  displayCards();
</script>
